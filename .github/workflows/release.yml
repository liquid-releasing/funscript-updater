name: Release Builds

on:
  push:
    tags:
      - "v*"          # Trigger on version tags like v1.0.0

permissions:
  contents: write     # Needed to create a GitHub Release and upload assets

jobs:
  # ---------------------------------------------------------------------------
  # Windows build
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build — Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install -r requirements.txt
          pip install -r ui/streamlit/requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller funscript_forge.spec --noconfirm

      - name: Verify build
        run: |
          if (!(Test-Path "dist\FunscriptForge\FunscriptForge.exe")) {
            Write-Error "Build artifact not found"
            exit 1
          }

      - name: Zip artifact
        run: |
          Compress-Archive -Path dist\FunscriptForge -DestinationPath dist\FunscriptForge-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FunscriptForge-windows
          path: dist/FunscriptForge-windows.zip

  # ---------------------------------------------------------------------------
  # macOS build
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build — macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install -r requirements.txt
          pip install -r ui/streamlit/requirements.txt

      - name: Generate .icns icon
        run: |
          ICO_SRC="media/anvil.png"
          ICNS_OUT="media/funscriptforge.icns"
          if [ -f "$ICO_SRC" ] && [ ! -f "$ICNS_OUT" ]; then
            ICONSET_DIR="$(mktemp -d)/FunscriptForge.iconset"
            mkdir -p "$ICONSET_DIR"
            for SIZE in 16 32 64 128 256 512; do
              sips -z "$SIZE" "$SIZE" "$ICO_SRC" --out "$ICONSET_DIR/icon_${SIZE}x${SIZE}.png" 2>/dev/null
              DOUBLE=$((SIZE * 2))
              sips -z "$DOUBLE" "$DOUBLE" "$ICO_SRC" --out "$ICONSET_DIR/icon_${SIZE}x${SIZE}@2x.png" 2>/dev/null
            done
            iconutil -c icns "$ICONSET_DIR" -o "$ICNS_OUT"
            rm -rf "$(dirname "$ICONSET_DIR")"
            echo "Generated $ICNS_OUT"
          fi

      - name: Build with PyInstaller
        run: pyinstaller funscript_forge.spec --noconfirm

      - name: Verify build
        run: |
          if [ ! -d "dist/FunscriptForge.app" ]; then
            echo "Build artifact not found"
            exit 1
          fi

      - name: Zip artifact
        run: |
          cd dist
          zip -r FunscriptForge-macos.zip FunscriptForge.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: FunscriptForge-macos
          path: dist/FunscriptForge-macos.zip

  # ---------------------------------------------------------------------------
  # Create GitHub Release with both artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FunscriptForge-windows
          path: artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FunscriptForge-macos
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FunscriptForge-windows.zip
            artifacts/FunscriptForge-macos.zip
          generate_release_notes: true
