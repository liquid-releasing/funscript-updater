<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 4px 4px 2px;
      background: #0e1117; color: #ddd;
      font-family: "Source Sans Pro", sans-serif; font-size: 13px;
    }

    /* ---- video display area ---- */
    #video-wrap {
      display: flex; justify-content: center;
      border-radius: 4px; overflow: hidden; margin-bottom: 4px;
      background: transparent;
    }
    #video-wrap.hidden { display: none; }
    #media-el {
      max-width: 100%; max-height: 240px; width: auto; display: block;
    }

    /* ---- waveform chart ---- */
    #chart { width: 100%; height: 114px; }
    #chart:empty { display: none; height: 0; }

    /* ---- button rows ---- */
    .row {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 0; flex-wrap: wrap;
    }
    .btn {
      background: #262730; color: #ddd;
      border: 1px solid #444; border-radius: 4px;
      padding: 4px 9px; cursor: pointer; font-size: 14px;
      white-space: nowrap;
    }
    .btn:hover  { background: #3a3a50; }
    .btn.active { background: #1f77b4; border-color: #1f77b4; color: #fff; }
    .btn.active:hover { background: #2a8acc; }
    .btn.pin    { background: #2d5a2d; border-color: #4a9a4a; }
    .btn.pin:hover { background: #3a703a; }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }

    #time-display {
      color: #9ca3af; font-size: 13px; min-width: 80px; text-align: center;
    }
    input[type=range] { width: 64px; accent-color: #1f77b4; vertical-align: middle; }
    select.spd {
      background: #262730; color: #ddd;
      border: 1px solid #444; border-radius: 4px;
      padding: 2px 4px; font-size: 13px; cursor: pointer;
    }
    .lbl { font-size: 12px; color: #9ca3af; }

    /* ---- position readout ---- */
    #readout  { font-size: 13px; color: #6ee66e; min-height: 18px; padding: 2px 0; }
    #pin-label { font-size: 13px; color: #6ee66e; font-style: italic; }

    /* ---- Plotly modebar — light icons on dark background ---- */
    .modebar { background: transparent !important; }
    .modebar-btn path { fill: #6b7280 !important; }
    .modebar-btn:hover path { fill: #e5e7eb !important; }
  </style>
</head>
<body>

<!-- Video display (hidden for audio-only media) -->
<div id="video-wrap" class="hidden">
  <video id="media-el" preload="auto"></video>
</div>

<!-- Waveform chart -->
<div id="chart"></div>
<div id="chart-hint" style="font-size:10px;color:#4b5563;text-align:right;margin:-2px 2px 2px 0;display:none;">scroll to zoom · drag to pan · double-click to reset</div>

<!-- Row 1: transport controls + time -->
<div class="row">
  <button class="btn active" id="btn-play" aria-label="Play">▶</button>
  <button class="btn" id="btn-stop"  aria-label="Stop">⏹</button>
  <button class="btn" id="btn-back"  aria-label="Back 1 second">-1s</button>
  <button class="btn" id="btn-fwd"   aria-label="Forward 1 second">+1s</button>
  <button class="btn" id="btn-fbk"   aria-label="Previous frame">◀fr</button>
  <button class="btn" id="btn-ffwd"  aria-label="Next frame">fr▶</button>
  <span   id="time-display" role="timer" aria-live="off">0:00 / 0:00</span>
</div>

<!-- Row 2: volume, speed, pin -->
<div class="row">
  <span class="lbl">Vol</span>
  <input type="range" id="vol" min="0" max="1" step="0.05" value="1" aria-label="Volume">
  <span class="lbl">Speed</span>
  <select id="spd" class="spd" aria-label="Playback speed">
    <option value="0.25">0.25×</option>
    <option value="0.5">0.5×</option>
    <option value="1" selected>1×</option>
    <option value="2">2×</option>
  </select>
  <button class="btn pin" id="btn-pin" aria-label="Set split here">📌</button>
  <span   id="pin-label" aria-live="polite"></span>
</div>

<!-- Position readout (updated on pause / frame step / seek) -->
<div id="readout"></div>

<!-- Hidden audio element for audio-only files -->
<audio id="audio-el" preload="auto" style="display:none"></audio>

<!-- Phase 1: send componentReady immediately so Streamlit's timeout never fires.
     Render args that arrive before Plotly is ready are buffered and flushed once
     the chart engine is available. -->
<script>
(function () {
  "use strict";
  function sendMsg(type, payload) {
    // isStreamlitMessage: true is required by Streamlit ≥ 1.x — without it the
    // message is silently discarded by the host frame and componentReady times out.
    window.parent.postMessage(
      Object.assign({ isStreamlitMessage: true, type }, payload), "*"
    );
  }
  window._sendMsg       = sendMsg;
  window._pendingArgs   = null;
  window._onRender      = null;   // set by Phase 2 once Plotly is loaded

  window.addEventListener("message", function (ev) {
    if (!ev.data || ev.data.type !== "streamlit:render") return;
    if (window._onRender) {
      window._onRender(ev.data.args);
    } else {
      window._pendingArgs = ev.data.args;  // buffer until Plotly ready
    }
  });

  sendMsg("streamlit:componentReady", { apiVersion: 1 });

  // Set frame height NOW — controls above this script tag are already parsed.
  // DOMContentLoaded fires *after* the blocking Plotly <script src> completes,
  // so we cannot use it here for an early-height signal.
  sendMsg("streamlit:setFrameHeight", { height: document.body.scrollHeight + 4 });
})();
</script>

<!-- Plotly — bundled locally for offline / local-desktop use -->
<script src="plotly-2.27.0.min.js"></script>

<script>
(function () {
  "use strict";

  var sendMsg = window._sendMsg;

  /* ------------------------------------------------------------------ *
   *  State                                                              *
   * ------------------------------------------------------------------ */
  let startMs = 0, endMs = 0;
  let lastMediaHash = null;
  let chartInitialized = false;
  let rafId = null;
  let currentActions = [];
  let eventsAttached = { audio: false, video: false };

  const FRAME_SEC = 1 / 30;  // assume 30 fps for frame stepping

  /* ------------------------------------------------------------------ *
   *  DOM refs                                                           *
   * ------------------------------------------------------------------ */
  const videoWrap   = document.getElementById("video-wrap");
  const videoEl     = document.getElementById("media-el");   // <video>
  const audioEl     = document.getElementById("audio-el");   // <audio>
  const btnPlay     = document.getElementById("btn-play");
  const btnStop     = document.getElementById("btn-stop");
  const btnBack     = document.getElementById("btn-back");
  const btnFwd      = document.getElementById("btn-fwd");
  const btnFbk      = document.getElementById("btn-fbk");
  const btnFfwd     = document.getElementById("btn-ffwd");
  const btnPin      = document.getElementById("btn-pin");
  const timeDisplay = document.getElementById("time-display");
  const pinLabel    = document.getElementById("pin-label");
  const readout     = document.getElementById("readout");
  const volSlider   = document.getElementById("vol");
  const spdSel      = document.getElementById("spd");

  /* Active media element — swapped by onRender based on media_type */
  let mediaEl = audioEl;

  /* ------------------------------------------------------------------ *
   *  Helpers                                                            *
   * ------------------------------------------------------------------ */
  function fmtSec(sec) {
    sec = Math.max(0, Math.round(sec));
    return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, "0")}`;
  }

  function fmtMs(ms) {
    ms = Math.max(0, Math.round(ms));
    const totalSec = Math.floor(ms / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    const msPart = ms % 1000;
    return `${m}:${String(s).padStart(2, "0")}.${String(msPart).padStart(3, "0")}`;
  }

  function currentAbsMs() {
    return Math.round(mediaEl.currentTime * 1000);
  }

  function phraseRelSec() {
    return Math.max(0, mediaEl.currentTime - startMs / 1000);
  }

  function phraseDurSec() {
    return (endMs - startMs) / 1000;
  }

  /* Binary-search interpolation of funscript position at absMs */
  function interpolatePos(absMs) {
    const acts = currentActions;
    if (!acts || acts.length === 0) return null;
    if (absMs <= acts[0].at) return acts[0].pos;
    if (absMs >= acts[acts.length - 1].at) return acts[acts.length - 1].pos;
    let lo = 0, hi = acts.length - 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (acts[mid].at <= absMs) lo = mid; else hi = mid;
    }
    const t = (absMs - acts[lo].at) / (acts[hi].at - acts[lo].at);
    return Math.round(acts[lo].pos + t * (acts[hi].pos - acts[lo].pos));
  }

  function updateTimeDisplay() {
    timeDisplay.textContent = `${fmtSec(phraseRelSec())} / ${fmtSec(phraseDurSec())}`;
  }

  function updateReadout() {
    const absMs = currentAbsMs();
    const pos = interpolatePos(absMs);
    readout.textContent = pos !== null ? `⏸ ${fmtMs(absMs)}  pos ${pos}` : "";
  }

  function clearReadout() {
    readout.textContent = "";
  }

  function movePlayhead(absMs) {
    if (!chartInitialized) return;
    Plotly.relayout("chart", { "shapes[0].x0": absMs, "shapes[0].x1": absMs });
  }

  /* ------------------------------------------------------------------ *
   *  Animation loop                                                     *
   * ------------------------------------------------------------------ */
  function animatePlayhead() {
    const absMs = currentAbsMs();
    movePlayhead(absMs);
    updateTimeDisplay();
    if (!mediaEl.paused) {
      rafId = requestAnimationFrame(animatePlayhead);
    }
  }

  /* ------------------------------------------------------------------ *
   *  Attach media events (once per element)                            *
   * ------------------------------------------------------------------ */
  function attachEvents(el, elKey) {
    if (eventsAttached[elKey]) return;
    eventsAttached[elKey] = true;

    /* Resize iframe once video dimensions are known (video-wrap was 0px until now) */
    el.addEventListener("loadedmetadata", () => {
      if (el !== mediaEl) return;
      autoHeight();
    });

    /* Enforce phrase end boundary */
    el.addEventListener("timeupdate", () => {
      if (el !== mediaEl) return;
      if (el.currentTime >= endMs / 1000) {
        el.pause();
        el.currentTime = endMs / 1000;
        cancelAnimationFrame(rafId);
        movePlayhead(endMs);
        updateTimeDisplay();
        updateReadout();
        btnPlay.textContent = "▶";
        btnPlay.setAttribute("aria-label", "Play");
      }
    });

    /* Show readout on pause */
    el.addEventListener("pause", () => {
      if (el !== mediaEl) return;
      cancelAnimationFrame(rafId);
      updateReadout();
    });

    el.addEventListener("play", () => {
      if (el !== mediaEl) return;
      clearReadout();
    });
  }

  /* ------------------------------------------------------------------ *
   *  Controls                                                           *
   * ------------------------------------------------------------------ */
  btnPlay.addEventListener("click", () => {
    if (mediaEl.paused) {
      if (mediaEl.currentTime < startMs / 1000 || mediaEl.currentTime >= endMs / 1000) {
        mediaEl.currentTime = startMs / 1000;
      }
      mediaEl.play();
      btnPlay.textContent = "⏸";
      btnPlay.setAttribute("aria-label", "Pause");
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(animatePlayhead);
    } else {
      mediaEl.pause();
      btnPlay.textContent = "▶";
      btnPlay.setAttribute("aria-label", "Play");
      cancelAnimationFrame(rafId);
    }
  });

  btnStop.addEventListener("click", () => {
    mediaEl.pause();
    mediaEl.currentTime = startMs / 1000;
    btnPlay.textContent = "▶";
    btnPlay.setAttribute("aria-label", "Play");
    cancelAnimationFrame(rafId);
    movePlayhead(startMs);
    updateTimeDisplay();
    clearReadout();
  });

  btnBack.addEventListener("click", () => {
    mediaEl.currentTime = Math.max(startMs / 1000, mediaEl.currentTime - 1);
    movePlayhead(currentAbsMs());
    updateTimeDisplay();
    updateReadout();
  });

  btnFwd.addEventListener("click", () => {
    mediaEl.currentTime = Math.min(endMs / 1000 - 0.001, mediaEl.currentTime + 1);
    movePlayhead(currentAbsMs());
    updateTimeDisplay();
    updateReadout();
  });

  btnFbk.addEventListener("click", () => {
    mediaEl.currentTime = Math.max(startMs / 1000, mediaEl.currentTime - FRAME_SEC);
    movePlayhead(currentAbsMs());
    updateTimeDisplay();
    updateReadout();
  });

  btnFfwd.addEventListener("click", () => {
    mediaEl.currentTime = Math.min(endMs / 1000 - 0.001, mediaEl.currentTime + FRAME_SEC);
    movePlayhead(currentAbsMs());
    updateTimeDisplay();
    updateReadout();
  });

  btnPin.addEventListener("click", () => {
    const absMs = currentAbsMs();
    if (absMs <= startMs || absMs >= endMs) return;
    pinLabel.textContent = `✓ ${fmtMs(absMs)}`;
    sendMsg("streamlit:setComponentValue", { value: { split_ms: absMs } });
  });

  volSlider.addEventListener("input", () => {
    mediaEl.volume = parseFloat(volSlider.value);
    if (audioEl !== mediaEl) audioEl.volume = parseFloat(volSlider.value);
    if (videoEl !== mediaEl) videoEl.volume = parseFloat(volSlider.value);
  });

  spdSel.addEventListener("change", () => {
    mediaEl.playbackRate = parseFloat(spdSel.value);
  });

  /* ------------------------------------------------------------------ *
   *  Chart build / update                                               *
   * ------------------------------------------------------------------ */
  function buildShapes(splitPoints) {
    const shapes = [{
      type: "line",
      x0: startMs, x1: startMs, y0: 0, y1: 100,
      line: { color: "#ef4444", width: 2 },
      layer: "above",
    }];
    for (const sp of (splitPoints || [])) {
      shapes.push({
        type: "line",
        x0: sp, x1: sp, y0: 0, y1: 100,
        line: { color: "#f59e0b", width: 1.5, dash: "dash" },
        layer: "above",
      });
    }
    return shapes;
  }

  function renderChart(actions, splitPoints) {
    const xs = actions.map(a => a.at);
    const ys = actions.map(a => a.pos);
    const labels = actions.map(a => {
      const ms = a.at, s = Math.floor(ms / 1000);
      const mm = Math.floor(s / 60), ss = s % 60, msf = ms % 1000;
      return `${mm}:${String(ss).padStart(2,"0")}.${String(msf).padStart(3,"0")}`;
    });
    const trace = {
      x: xs, y: ys, type: "scatter", mode: "lines+markers",
      line:   { color: "#3b82f6", width: 1.5 },
      marker: { color: "#3b82f6", size: 3 },
      text: labels,
      hovertemplate: "%{text}<br>pos %{y}<extra></extra>",
    };

    const headMs = currentAbsMs();
    const shapes = buildShapes(splitPoints);
    shapes[0].x0 = shapes[0].x1 = headMs;

    const layout = {
      xaxis: {
        range: [startMs, endMs], showgrid: false, zeroline: false,
        color: "#6b7280", tickfont: { size: 9, color: "#6b7280" },
      },
      yaxis: {
        range: [0, 100], showgrid: false, zeroline: false,
        color: "#6b7280", tickfont: { size: 9, color: "#6b7280" }, dtick: 25,
      },
      paper_bgcolor: "#0e1117",
      plot_bgcolor:  "#0e1117",
      margin: { l: 28, r: 4, t: 4, b: 22 },
      shapes,
      showlegend: false,
      height: 110,
    };
    const cfg = { displayModeBar: "hover", doubleClick: "reset", displaylogo: false };

    if (!chartInitialized) {
      Plotly.newPlot("chart", [trace], layout, cfg).then(() => {
        chartInitialized = true;
        document.getElementById("chart-hint").style.display = "block";
        autoHeight();
      });
    } else {
      Plotly.react("chart", [trace], layout, cfg);
    }
  }

  function autoHeight() {
    // Extra 20px so the readout line at the bottom is never clipped by Streamlit's iframe.
    const h = document.body.scrollHeight + 20;
    sendMsg("streamlit:setFrameHeight", { height: h });
  }

  /* ------------------------------------------------------------------ *
   *  Render callback (called on every Streamlit re-render)             *
   * ------------------------------------------------------------------ */
  function onRender(args) {
    startMs        = args.start_ms || 0;
    endMs          = args.end_ms   || 0;
    currentActions = args.actions  || [];

    const isVideo = (args.media_type === "video");

    /* Switch active media element based on media type */
    if (isVideo) {
      videoWrap.classList.remove("hidden");
      mediaEl = videoEl;
      attachEvents(videoEl, "video");
    } else {
      videoWrap.classList.add("hidden");
      mediaEl = audioEl;
      attachEvents(audioEl, "audio");
    }

    /* Reload media source only when the file actually changes */
    const mediaHash = args.media_hash || args.audio_hash;
    if (mediaHash !== lastMediaHash) {
      lastMediaHash = mediaHash;

      /* Pause and reset the previous element if switching type */
      audioEl.pause();
      videoEl.pause();

      const url  = args.media_url  || args.audio_url;
      const b64  = args.media_b64  || args.audio_b64;
      const mime = args.media_mime || args.audio_mime;

      if (url) {
        mediaEl.src = url;
      } else if (b64 && mime) {
        mediaEl.src = `data:${mime};base64,${b64}`;
      }

      mediaEl.currentTime = startMs / 1000;
      mediaEl.volume      = parseFloat(volSlider.value);
      mediaEl.playbackRate = parseFloat(spdSel.value);

      btnPlay.textContent = "▶";
      btnPlay.setAttribute("aria-label", "Play");
      pinLabel.textContent = "";
      clearReadout();
      cancelAnimationFrame(rafId);
    }

    updateTimeDisplay();
    renderChart(currentActions, args.split_points || []);
  }

  // ResizeObserver — keeps iframe height in sync with component body.
  // Debounced to 120 ms so 60 fps Plotly relayout calls don't spam Streamlit.
  let _roTimer = null;
  new ResizeObserver(() => {
    clearTimeout(_roTimer);
    _roTimer = setTimeout(autoHeight, 120);
  }).observe(document.body);

  // Phase 2: register onRender and flush any render that arrived before Plotly loaded.
  window._onRender = onRender;
  if (window._pendingArgs) {
    onRender(window._pendingArgs);
    window._pendingArgs = null;
  }

})();
</script>
</body>
</html>
